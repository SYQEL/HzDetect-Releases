# HZ Detect Desktop — release workflow for the PUBLIC release repo
# github.com/SYQEL/HzDetect-Releases. Copy this to `.github/workflows/release.yml`
# in THAT repo. Mirrors the SYQEL ART pipeline: on a v* tag it clones the private
# GitLab source, builds macOS universal + Windows, OS-signs (Apple notarize /
# Azure Trusted Signing), updater-signs, and publishes installers + latest.json.
#
# Secrets to set on the release repo:
#   GITLAB_TOKEN                         (read-only deploy token for the hzdetect repo)
#   TAURI_SIGNING_PRIVATE_KEY(+_PASSWORD) (generate once: `npm create tauri-app` -> `tauri signer generate`)
#   APPLE_CERTIFICATE / _PASSWORD / APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID  (SYQEL INC — same as SYQEL ART)
#   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET  (Azure Trusted Signing — new "HZDetect" cert profile)

name: release-desktop
on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      # 1. Pull the private source from GitLab (adjust the path to your repo).
      - name: Clone private source
        run: git clone --depth 1 --branch main "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/syqel/hzdetect.git" source

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install deps
        run: npm ci
        working-directory: source

      - name: Install trusted-signing-cli (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          projectPath: source/desktop/app
          tagName: ${{ github.ref_name }}
          releaseName: 'HZ Detect ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

# NOTE: bump version in desktop/app/src-tauri/tauri.conf.json (+ Cargo.toml) to match each tag.
# The MAS build is produced separately on your Windows/Mac per the SYQEL "App Store overlay" flow.
